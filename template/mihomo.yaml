# HTTP & SOCKS5 代理端口
mixed-port: 7897

# 规则模式：Rule（规则） / Global（全局代理）/ Direct（全局直连）
mode: rule

# 设置日志输出级别 (默认级别：info）。
# 5 个级别：silent / info / warning / error / debug。silent，即不输出任何内容,级别越高日志输出量越大，越倾向于调试，若需要请自行开启。
log-level: info

# 是否启用 IPv6
ipv6: false

# 允许局域网的连接（可用来共享代理）
allow-lan: false
# bind-address: "*"
# 此功能仅在 allow-lan 设置为 true 时生效，支持三种参数：
# "*"                           绑定所有的 IP 地址
# 192.168.122.11                绑定一个的 IPv4 地址
# "[aaaa::a8aa:ff:fe09:57d8]"   绑定一个 IPv6 地址

# Meta 内核特性 https://wiki.metacubex.one/config/general
# 统一延迟
# 更换延迟计算方式,去除握手等额外延迟
unified-delay: true
# TCP 并发
# 同时对所有ip进行连接，返回延迟最低的地址
tcp-concurrent: true

# 进程匹配模式
# 路由器上请设置为 off
# always 开启，强制匹配所有进程
# strict 默认，由 Clash 判断是否开启
# off 不匹配进程，推荐在路由器上使用此模式
find-process-mode: strict

# 自定全局UA
global-ua: chrome

# clash 的 RESTful API
external-controller: 127.0.0.1:9090

# GEOIP 数据模式
# 更改 geoip 使用文件，mmdb 或者 dat，可选 true/false,true为 dat，此项有默认值 false
geodata-mode: true

# 自动更新 GEO
geo-auto-update: true
# 更新间隔，单位为小时
geo-update-interval: 24

# Geo 数据库下载地址
# 使用 FastGit 代理 (https://fgit.cf)
# 源地址 https://github.com/MetaCubeX/meta-rules-dat
# 可以更换镜像站但不要更换其他数据库，可能导致无法启动
geox-url:
  geoip: https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
  geosite: https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat
  mmdb: https://github.com/Loyalsoldier/geoip@release/Country-without-asn.mmdb
  asn: https://github.com/Loyalsoldier/geoip@release/GeoLite2-ASN.mmdb


# 缓存
profile:
  store-selected: true
  # 储存 API 对策略组的选择，以供下次启动时使用
  store-fake-ip: true
  # 储存 fakeip 映射表，域名再次发生连接时，使用原有映射地址
  
# 自动同步时间以防止时间不准导致无法正常联网
ntp:
  enable: false
  # 是否同步至系统时间，需要 root/管理员权限
  write-to-system: false
  server: time.apple.com
  port: 123
  interval: 30
  
# 实验性功能
experimental:
  ignore-resolve-fail: true # 忽略 DNS 解析失败，默认值为 true

# # 实验性功能 hosts, 支持通配符 (例如 *.clash.dev 甚至 *.foo.*.example.com)
# # 静态的域名 比 通配域名 具有更高的优先级 (foo.example.com 优先于 *.example.com)
# 注意: +.foo.com 的效果等同于 .foo.com 和 foo.com
hosts:
'mtalk.google.com': 108.177.125.188

# 域名嗅探
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com
  skip-domain:
    - "Mijia Cloud"
    - '+.apple.com'  
    - '+.icloud.com'  
    - '+.wechat.com'  
    - '+.qpic.cn'  
    - '+.qq.com'  
    - '+.wechatapp.com'  
    - '+.vivox.com'  
    - '+.oray.com'  
    - '+.sunlogin.net'  

# 禁用 TUN
tun:
  enable: false
  stack: system # gvisor/mixed
  dns-hijack:
    - 'any:53'
  auto-route: true
  auto-detect-interface: true
  
# 如需要自定义DNS，请将 enable 处的 false 改为 true
dns:
  enable: true
  ipv6: false
  prefer-h3: true
  use-hosts: true
  use-system-hosts: true
  skip-cert-verify: true
  respect-rules: true 
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip # 或 redir-host
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:  # fake-ip 白名单列表
    - rule-set:China
    - '*.lan'
    - '+.msftncsi.com'
    - '+.msftconnecttest.com'
    - 'detectportal.firefox.com'
    - 'localhost.*.qq.com'
    - '+.cmpassport.com'
    - 'id6.me'
    - 'open.e.189.cn'
    - 'mdn.open.wo.cn'
    - 'auth.wosms.cn'
    - '+.brother.cn'
    - '+.boc.cn'
    - '+.ccb.com'
    - '+.ccb.com.cn'
    - '+.cmbchina.com'
    - '+.pingan.com.cn'
    - '+.ninebot.com'
    # - '223.5.5.5'
    # - '1.12.12.12'
    # - '180.184.1.1'
    # - '+.qq.com'
    # - '+.tencent.com'
    # - '+.wechat.com'
    # - '+.wechatapp.com'    
    # - 'rule-set:China'
    # - geosite:private
    # - geosite:cn

  # 用于解析 nameserver，fallback 以及其他 DNS 服务器配置的，DNS 服务域名
  # 只能使用纯 IP 地址，可使用加密 DNS
  default-nameserver:
    - system
    - tls://223.5.5.5:853
    - tls://119.29.29.29:853
    - system # append DNS server from system configuration. If not found, it would print an error log and skip.
    
  # 默认的域名解析服务器，设置为境外DNS，境内的优先使用下面nameserver-policy配置
  nameserver:
    - https://dns.cloudflare.com/dns-query
    - https://sky.rethinkdns.com/dns-query
    - https://doh.18bit.cn/dns-query
    # - https://8.8.8.8/dns-query             # Google
    # - https://1.1.1.1/dns-query             # Cloudflare
    
  proxy-server-nameserver:
    - tls://223.5.5.5:853
    - tls://119.29.29.29:853
    
  # 指定域名查询的解析服务器，可使用 geosite, 优先于 nameserver/fallback 查询
  nameserver-policy:
    'rule-set:LocalCom,LAN':          
      - system                             # 公司DNS
    'geosite:cn,private':
      - https://dns.alidns.com/dns-query   # 阿里DoH
      - https://doh.360.cn/dns-query       # 360 DoH
      - https://doh.pub/dns-query          # 腾讯DoH
    'rule-set:China':
      - https://dns.alidns.com/dns-query   # 阿里DoH
      - https://doh.360.cn/dns-query       # 360 DoH
      - https://doh.pub/dns-query          # 腾讯DoH


# YAML 锚点和引用功能，减少重复配置
# 订阅及检测公共配置
anchor-sub: &anchor-sub
  type: http
  # 自动更新订阅时间，单位为秒
  interval: 604800
  # proxy: ✈️ 常用节点
  health-check:
    enable: true
    url: https://cp.cloudflare.com
    # 节点连通性检测时间，单位为秒
    interval: 3600
    # 节点超时延迟，单位为毫秒
    timeout: 1000
    # 节点自动切换差值，单位为毫秒
    tolerance: 20

# 节点延迟检测公共配置  
anchor-proxy: &anchor-proxy
  type: url-test
  lazy: false
  disable-udp: false
  # 节点连通性检测时间，单位为秒
  interval: 300
  # 节点自动切换差值，单位为毫秒
  tolerance: 20
  timeout: 2000
  max-feiled-times: 2
  exclude-type: direct
  url: https://connectivitycheck.platform.hicloud.com/generate_204  # http://wifi.vivo.com.cn/generate_204  # 
  # include-all: true  # 和 use 单个 provider 冲突
  # use:    # 和 include-all: true 冲突
  #   - primary

# 规则订阅公共配置-混合类型
anchor-rule: &anchor-rule
  type: http
  interval: 86400
  behavior: classical
  format: yaml
  # proxy: ✈️ 常用节点
  
# 订阅链接
# 对于订阅来说，path 为选填项，但建议启用
# 本地配置可以只填 path
proxy-providers:
  # 主用机场
  leiting:
    <<: *anchor-sub
    path: ./proxy_provider/leiting.yaml
    url: https://sub.789.st/sub?target=clash&url=
    # exclude-filter: "剩余|可用|无法|套餐|官网|测试|随机|等级|备用"
    override:
      additional-prefix: "[雷霆]"
    
  mojie:
    <<: *anchor-sub
    path: ./proxy_provider/mojie.yaml
    url: https://url.v1.mk/sub?target=clash&url=
    # exclude-filter: "剩余|可用|无法|套餐|官网|测试|随机|等级|备用"
    override:
      additional-prefix: "[魔戒]"

